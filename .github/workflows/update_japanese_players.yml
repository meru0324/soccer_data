name: Update Japanese players

"on":
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

concurrency:
  group: soccer-data-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Japanese player data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python update_japanese_players.py

      - name: Commit updated player data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add japanese_players.json api_football_state.json
          if [ -f japanese_players_overrides.json ]; then
            git add japanese_players_overrides.json
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update Japanese player data"
          git pull --rebase
          git push
